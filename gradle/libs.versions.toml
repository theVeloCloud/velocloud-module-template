[versions]
kotlin = "2.3.0"

velocloud = "3.0.0-pre.8-SNAPSHOT"

log4j = "2.25.3"

[libraries]
velocloud-shared =  { group = "de.snenjih.velocloud", name = "shared", version.ref = "velocloud" }
velocloud-agent =  { group = "de.snenjih.velocloud", name = "agent", version.ref = "velocloud" }
velocloud-common =  { group = "de.snenjih.velocloud", name = "common", version.ref = "velocloud" }
velocloud-proto =  { group = "de.snenjih.velocloud", name = "proto", version.ref = "velocloud" }

log4j-api = { group = "org.apache.logging.log4j", name = "log4j-api", version.ref = "log4j" }

[plugins]
velocloud-module = { id = "de.snenjih.velocloud.module", version.ref = "velocloud" }
